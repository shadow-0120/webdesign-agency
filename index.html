<!doctype html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Primary Meta Tags -->
  <title>Vibe | Premium Web Design & Development Agency</title>
  <meta name="title" content="Vibe | Premium Web Design & Development Agency" />
  <meta name="description" content="We create stunning, high-performance websites that elevate your brand. Specializing in modern design, innovative coding, and cinematic digital experiences." />
  <meta name="keywords" content="web design, web development, digital agency, UI/UX, premium websites, Vite, React, Tailwind CSS" />
  <meta name="author" content="Vibe Design Team" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://vibedesign.agency/" />
  <meta property="og:title" content="Vibe | Premium Web Design & Development Agency" />
  <meta property="og:description" content="We create stunning, high-performance websites that elevate your brand." />
  <meta property="og:image" content="/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://vibedesign.agency/" />
  <meta property="twitter:title" content="Vibe | Premium Web Design & Development Agency" />
  <meta property="twitter:description" content="We create stunning, high-performance websites that elevate your brand." />
  <meta property="twitter:image" content="/og-image.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23f97316'/><text y='50%' x='50%' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='60' fill='white'>V</text></svg>" />

  <!-- Font Preconnections -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    /* Prevent FOUC (Flash of Unstyled Content) and set basic background */
    :root {
      background-color: #000;
    }
    body {
      margin: 0;
      background-color: #000;
      color: #fff;
    }
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(249, 115, 22, 0.3);
      border-radius: 50%;
      border-top-color: #f97316;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="loading-screen">
    <div class="spinner"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Remove loading screen after the app is loaded
    window.addEventListener('load', () => {
      const loader = document.getElementById('loading-screen');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 500);
      }
    });
  </script>
</body>

</html>
